<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Pokemon – Vending Machine Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0e0e0e;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #c8f135;
      --accent2:   #f1c435;
      --text:      #f0f0f0;
      --muted:     #888;
      --radius:    10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .header-sub {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(200,241,53,0.04);
    }

    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* Machine list */
    .machine-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .machine-list::-webkit-scrollbar { width: 4px; }
    .machine-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .machine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .machine-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .machine-card.selected { border-color: var(--accent); background: rgba(200,241,53,0.06); }

    .machine-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .machine-address {
      font-size: 0.76rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }
    .machine-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .visit-count {
      background: rgba(200,241,53,0.12);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
    }

    /* Visit log form */
    .form-panel {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    input, select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: #1a1a1a; }
    textarea { resize: vertical; min-height: 70px; }

    .btn {
      padding: 12px;
      border-radius: var(--radius);
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary {
      background: var(--accent);
      color: #0e0e0e;
    }
    .btn-primary:hover { background: #d8ff3a; transform: translateY(-1px); }

    .success-msg {
      background: rgba(200,241,53,0.1);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--accent);
      display: none;
    }

    /* Visit history */
    .visit-history {
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .visit-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .visit-product {
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 4px;
    }
    .visit-machine {
      font-size: 0.75rem;
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
    }
    .visit-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 10px; }

    /* ── Map ── */
    #map {
      flex: 1;
      background: #111;
    }

    /* Leaflet custom pin */
    .custom-pin {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid #0e0e0e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .custom-pin.selected-pin {
      background: var(--accent2);
    }
    .custom-pin-inner {
      transform: rotate(45deg);
      font-size: 14px;
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      color: var(--text) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; }

    .popup-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .popup-address {
      font-size: 0.76rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 10px;
    }
    .popup-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
    }
    .popup-btn:hover { background: #d8ff3a; }

    /* Scrollbar */
    .form-panel::-webkit-scrollbar,
    .visit-history::-webkit-scrollbar { width: 4px; }
    .form-panel::-webkit-scrollbar-thumb,
    .visit-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Poke<span>Map</span></div>
  <div class="header-sub">// Poke vending tracker</div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" onclick="switchTab('machines')">Machines</button>
      <button class="tab" onclick="switchTab('log')">Log Visit</button>
      <button class="tab" onclick="switchTab('history')">History</button>
    </div>

    <!-- Tab: Machines -->
    <div class="panel active" id="panel-machines">
      <div class="machine-list" id="machine-list"></div>
    </div>

    <!-- Tab: Log Visit -->
    <div class="panel" id="panel-log">
      <div class="form-panel">
        <div class="form-title">// Log a Visit</div>

        <label>
          Vending Machine
          <select id="form-machine">
            <option value="">— Select a machine —</option>
          </select>
        </label>

        <label>
          Product You Got
          <input type="text" id="form-product" placeholder="e.g. Doritos, Coke Zero, Kind Bar…"/>
        </label>

        <label>
          Date & Time of Visit
          <input type="datetime-local" id="form-time"/>
        </label>

        <label>
          Notes (optional)
          <textarea id="form-notes" placeholder="Was it stocked? Any broken slots?"></textarea>
        </label>

        <button class="btn btn-primary" onclick="logVisit()">Log Visit →</button>
        <div class="success-msg" id="success-msg">✓ Visit logged successfully!</div>
      </div>
    </div>

    <!-- Tab: History -->
    <div class="panel" id="panel-history">
      <div class="visit-history" id="visit-history">
        <div class="empty-state">
          <div class="icon">🗒️</div>
          No visits logged yet.<br/>Head to <strong>Log Visit</strong> to add one.
        </div>
      </div>
    </div>
  </div>

  <!-- ── Map ── -->
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ── DATA ──────────────────────────────────────────────
  // Add vending locations here
  // To find lat/lng: go to maps.google.com, right-click a spot, click the coordinates
  const MACHINES = [
    {
      id: 1,
      name: "Albertsons",
      address: "wtv addy",
      lat: 33.8170,
      lng: -118.0375,
    },
    {
      id: 2,
      name: "Vons",
      address: "addy",
      lat: 33.8210,
      lng: -118.0340,
    },
    {
      id: 3,
      name: "Vons",
      address: "addy",
      lat: 33.8145,
      lng: -118.0410,
    },
  ];

  // Visits are stored in memory for now
  // Later: swap this array for a Supabase database call
  let visits = [];
  let selectedMachineId = null;
  let markers = {};

  // ── MAP SETUP ─────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([33.8170, -118.0375], 15);

  // Dark tile layer (CartoDB Dark Matter — free, no API key needed)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19,
  }).addTo(map);

  // ── RENDER MACHINES ───────────────────────────────────
  function createPinIcon(selected = false) {
    return L.divIcon({
      className: '',
      html: `<div class="custom-pin ${selected ? 'selected-pin' : ''}">
               <div class="custom-pin-inner">🥤</div>
             </div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 34],
      popupAnchor: [0, -36],
    });
  }

  function selectMachine(id) {
    selectedMachineId = id;

    // Update marker icons
    MACHINES.forEach(m => {
      markers[m.id].setIcon(createPinIcon(m.id === id));
    });

    // Highlight sidebar card
    document.querySelectorAll('.machine-card').forEach(c => {
      c.classList.toggle('selected', parseInt(c.dataset.id) === id);
    });

    // Pre-fill log form
    document.getElementById('form-machine').value = id;
  }

  function buildMachineList() {
    const list = document.getElementById('machine-list');
    const select = document.getElementById('form-machine');

    list.innerHTML = '';
    select.innerHTML = '<option value="">— Select a machine —</option>';

    MACHINES.forEach(m => {
      const visitCount = visits.filter(v => v.machineId === m.id).length;

      // Sidebar card
      const card = document.createElement('div');
      card.className = 'machine-card';
      card.dataset.id = m.id;
      card.innerHTML = `
        <div class="machine-name">${m.name}</div>
        <div class="machine-address">${m.address}</div>
        <div class="machine-meta">
          <span>${visitCount} visit${visitCount !== 1 ? 's' : ''}</span>
          <span class="visit-count">${visitCount > 0 ? '✓ active' : '○ no data'}</span>
        </div>
      `;
      card.onclick = () => {
        selectMachine(m.id);
        map.flyTo([m.lat, m.lng], 17, { duration: 0.8 });
        markers[m.id].openPopup();
      };
      list.appendChild(card);

      // Dropdown option
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `${m.name} — ${m.address}`;
      select.appendChild(opt);
    });
  }

  function buildMarkers() {
    MACHINES.forEach(m => {
      const marker = L.marker([m.lat, m.lng], { icon: createPinIcon(false) }).addTo(map);

      marker.bindPopup(`
        <div class="popup-name">${m.name}</div>
        <div class="popup-address">${m.address}</div>
        <button class="popup-btn" onclick="openLogFor(${m.id})">Log a visit →</button>
      `);

      marker.on('click', () => selectMachine(m.id));
      markers[m.id] = marker;
    });
  }

  function openLogFor(machineId) {
    selectMachine(machineId);
    switchTab('log');
    document.getElementById('form-machine').value = machineId;

    // Set current time as default
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('form-time').value = now.toISOString().slice(0, 16);
  }

  // ── LOG VISIT ─────────────────────────────────────────
  function logVisit() {
    const machineId = parseInt(document.getElementById('form-machine').value);
    const product   = document.getElementById('form-product').value.trim();
    const time      = document.getElementById('form-time').value;
    const notes     = document.getElementById('form-notes').value.trim();

    if (!machineId || !product || !time) {
      alert('Please fill in the machine, product, and time.');
      return;
    }

    const visit = { machineId, product, time, notes, id: Date.now() };
    visits.push(visit);

    // Show success
    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);

    // Clear form
    document.getElementById('form-product').value = '';
    document.getElementById('form-notes').value = '';

    // Refresh UI
    buildMachineList();
    buildHistory();
  }

  // ── HISTORY ───────────────────────────────────────────
  function buildHistory() {
    const container = document.getElementById('visit-history');

    if (visits.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🗒️</div>
          No visits logged yet.<br/>Head to <strong>Log Visit</strong> to add one.
        </div>`;
      return;
    }

    const sorted = [...visits].sort((a, b) => new Date(b.time) - new Date(a.time));
    container.innerHTML = '';

    sorted.forEach(v => {
      const machine = MACHINES.find(m => m.id === v.machineId);
      const dt = new Date(v.time);
      const formatted = dt.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });

      const item = document.createElement('div');
      item.className = 'visit-item';
      item.innerHTML = `
        <div class="visit-product">🛒 ${v.product}</div>
        <div class="visit-machine">📍 ${machine?.name ?? 'Unknown'}</div>
        <div class="visit-time">${formatted}</div>
        ${v.notes ? `<div style="font-size:0.76rem;color:#888;margin-top:6px">${v.notes}</div>` : ''}
      `;
      container.appendChild(item);
    });
  }

  // ── TABS ──────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['machines','log','history'][i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('active', p.id === `panel-${name}`);
    });
    if (name === 'history') buildHistory();
  }

  // ── INIT ──────────────────────────────────────────────
  // Set default datetime for log form
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('form-time').value = now.toISOString().slice(0, 16);

  buildMarkers();
  buildMachineList();
</script>
</body>
</html>
